name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rust-plugin:
    name: Rust Plugin
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: cargo-

      # ALSA for the standalone (cpal); the rest are the GUI build deps pulled in
      # by the in-host egui editor (egui -> baseview -> OpenGL/X11). Mirrors
      # nih-plug's own CI dependency list.
      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libgl-dev libjack-dev libx11-xcb-dev libxcb1-dev libxcb-dri2-0-dev libxcb-icccm4-dev libxcursor-dev libxkbcommon-dev libxcb-shape0-dev libxcb-xfixes0-dev

      - name: Bundle VST3 + CLAP
        run: cargo xtask bundle compose-vst-plugin --release

      - name: Build standalone
        run: cargo build --release --features standalone --bin compose-vst-standalone

      - name: Upload bundles
        uses: actions/upload-artifact@v4
        with:
          name: compose-vst-linux
          path: target/bundled/

  compose-ui:
    name: Compose UI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: ./gradlew build --no-daemon
